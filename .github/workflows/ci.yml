name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  coding-standards:
    name: Coding standards (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.0', '8.3' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpcs
          coverage: none

      - name: PHP syntax check
        run: find . -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

      # WordPress Coding Standards installed without Composer: clone the
      # standards and register them on PHPCS's installed_paths.
      - name: Install WordPress Coding Standards
        run: |
          git clone --depth 1 --branch 3.1.0 https://github.com/WordPress/WordPress-Coding-Standards.git "$RUNNER_TEMP/wpcs"
          git clone --depth 1 --branch 1.0.12 https://github.com/PHPCSStandards/PHPCSUtils.git "$RUNNER_TEMP/phpcsutils"
          phpcs --config-set installed_paths "$RUNNER_TEMP/wpcs,$RUNNER_TEMP/phpcsutils"
          phpcs -i

      - name: Run PHPCS
        run: phpcs
